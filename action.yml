name: 'PR Deadline Labeler'
description: 'PR 코드리뷰 마감일 기반으로 라벨을 자동 부착합니다.'

inputs:
  github-token:
    required: true
    description: 'Github 접근을 위한 토큰'
  base-date:
    required: false
    description: '업데이트를 위한 기준일자'
  pr-number:
    required: false
    description: '업데이트하고자 하는 PR 번호'
  deadline-days:
    required: false
    default: '2'
    description: '코드리뷰 최대 마감일 지정'

runs:
  using: 'docker'
  image: 'Dockerfile'
